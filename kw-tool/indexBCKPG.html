<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Keyword Tool - Web Edition</title>
    <style>
        /* --- Global Variables & Basic Setup --- */
        :root {
            --primary-color: #007bff;
            --primary-hover-color: #0056b3;
            --accent-color: #212529;
            --accent-text-color: #ffffff;
            --border-color: #dee2e6;
            --input-focus-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
            --font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            --base-border-radius: 6px;
        }

        body {
            font-family: var(--font-family);
            margin: 0;
            padding: 40px 20px;
            background-color: #f4f6f8;
            color: #333;
            display: flex;
            justify-content: center;
        }

        .app-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 600px;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        /* --- TABS STYLING --- */
        .tabs-container {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        .tab-button {
            flex-grow: 1;
            padding: 12px;
            border: none;
            background-color: transparent;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            color: #6c757d;
            border-bottom: 3px solid transparent;
            transition: all 0.2s ease;
        }
        .tab-button.active {
            color: var(--primary-color);
            border-bottom: 3px solid var(--primary-color);
        }
        .view { display: none; }
        .view.active { display: block; }

        h1 {
            font-size: 20px;
            margin-top: 0;
            color: var(--accent-color);
        }

        /* --- Input Fields & Groups --- */
        .input-group, .buttons-group {
            margin-bottom: 15px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        select, input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            background-color: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: var(--base-border-radius);
            font-size: 14px;
            color: #343a40;
            box-sizing: border-box;
            transition: border-color .15s ease-in-out, box-shadow .15s ease-in-out;
        }
        select:focus, input[type="text"]:focus {
            border-color: var(--primary-color);
            outline: 0;
            box-shadow: var(--input-focus-shadow);
        }

        /* Special Input Field Backgrounds */
        .advanced-bg { background-color: #fff3e0 !important; }
        .negative-bg { background-color: #ffebee !important; }

        /* --- Buttons --- */
        .buttons-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .primary-btn {
            flex-grow: 1;
            padding: 12px 20px;
            border: none;
            border-radius: var(--base-border-radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background-color: var(--primary-color);
            color: white;
            transition: background-color 0.2s ease-in-out;
        }
        .primary-btn:hover { background-color: var(--primary-hover-color); }
        .primary-btn:disabled { background-color: #5a6268; cursor: not-allowed; }

        /* --- Loader --- */
        .loader {
            display: none;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- Results Area --- */
        .results-header {
            display: none;
            justify-content: space-between;
            align-items: center;
            padding: 10px 4px;
            border-bottom: 1px solid #ddd;
            margin-bottom: 10px;
        }
        .suggestions-count { font-size: 14px; font-weight: 700; color: #555; }
        .action-btn {
            font-size: 12px;
            padding: 6px 12px;
            margin-left: 5px;
            border: 1px solid #ccc;
            background-color: #f8f9fa;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }
        .action-btn:hover { background-color: #e2e6ea; }

        .suggestions-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: var(--base-border-radius);
            background: white;
        }
        .suggestion-item {
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.1s;
        }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover { background-color: #e9ecef; }
        .suggestion-item.error { color: #dc3545; background-color: #f8d7da; pointer-events: none; }

        /* --- Platforms Grid --- */
        .platforms-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
            font-size: 14px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: var(--base-border-radius);
            border: 1px solid var(--border-color);
        }
        .platforms-list label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="tabs-container">
        <button class="tab-button active" data-view="amazon-view">Amazon Engine</button>
        <button class="tab-button" data-view="platforms-view">Multi-Platform Engine</button>
    </div>

    <!-- AMAZON VIEW -->
    <div id="amazon-view" class="view active">
        <h1>Advanced Amazon Keywords</h1>
        <div class="input-group">
            <select id="market-selector">
                <option value="US" selected>Amazon.com</option>
                <option value="UK">Amazon.co.uk</option>
                <option value="DE">Amazon.de</option>
                <option value="FR">Amazon.fr</option>
                <option value="ES">Amazon.es</option>
                <option value="IT">Amazon.it</option>
            </select>
            <input id="amz-title" type="text" placeholder="Enter Product Title...">
            <input id="amz-brand" type="text" placeholder="Enter Brand Name...">
            <input id="amz-advanced" class="advanced-bg" type="text" placeholder="Advanced words (e.g., for kids, funny, best)">
            <input id="amz-negative" class="negative-bg" type="text" placeholder="Negative keywords (e.g., free, cheap)">
        </div>
        <div class="buttons-group">
            <button id="amz-analyze-btn" class="primary-btn">Analyze Keywords</button>
            <div id="amz-loader" class="loader"></div>
        </div>

        <div id="amz-results-header" class="results-header">
            <span id="amz-count" class="suggestions-count"></span>
            <div>
                <button id="amz-copy-btn" class="action-btn">Copy All</button>
                <button id="amz-txt-btn" class="action-btn">.TXT</button>
                <button id="amz-csv-btn" class="action-btn">.CSV</button>
            </div>
        </div>
        <ul id="amz-results" class="suggestions-list"></ul>
    </div>

    <!-- MULTI PLATFORM VIEW -->
    <div id="platforms-view" class="view">
        <h1>Multi-Platform Mining</h1>
        <div class="input-group">
             <input id="plat-title" type="text" placeholder="Enter Product Title...">
             <input id="plat-brand" type="text" placeholder="Enter Brand Name...">
             <input id="plat-advanced" class="advanced-bg" type="text" placeholder="Advanced words (e.g., for kids, funny, best)">
             <input id="plat-negative" class="negative-bg" type="text" placeholder="Negative keywords (e.g., free, cheap)">
        </div>
        
        <div class="platforms-list" id="platform-checkboxes">
            <!-- Populated via JS -->
        </div>

         <div class="buttons-group">
            <button id="plat-analyze-btn" class="primary-btn">Analyze Platforms</button>
            <div id="plat-loader" class="loader"></div>
        </div>

        <div id="plat-results-header" class="results-header">
            <span id="plat-count" class="suggestions-count"></span>
            <div>
                <button id="plat-copy-btn" class="action-btn">Copy All</button>
                <button id="plat-txt-btn" class="action-btn">.TXT</button>
                <button id="plat-csv-btn" class="action-btn">.CSV</button>
            </div>
        </div>
        <ul id="plat-results" class="suggestions-list"></ul>
    </div>
</div>

<script>
    // =========================================================================
    // CONFIGURATION
    // =========================================================================
    // IMPORTANT: Paste your Cloudflare Worker URL below. Make sure it ends with ?url=
    const WORKER_URL = "https://cors-proxy-keyword-tool.awrdjmusic.workers.dev/?url=";

    // Data Structures from background.js
    const markets = {
        US: { mid: "ATVPDKIKX0DER", domain: "completion.amazon.com" },
        UK: { mid: "A1F83G8C2ARO7P", domain: "completion.amazon.co.uk" },
        DE: { mid: "A1PA6795UKMFR9", domain: "completion.amazon.de" },
        FR: { mid: "A13V1IB3VIYZZH", domain: "completion.amazon.fr" },
        ES: { mid: "A1RKKUPIHCS9HS", domain: "completion.amazon.es" },
        IT: { mid: "APJ6JRA9NG5V4", domain: "completion.amazon.it" }
    };

    const platformConfig = {
        Google: { 
            buildUrl: e => "https://suggestqueries.google.com/complete/search?client=firefox&q=" + encodeURIComponent(e), 
            parseResponse: async e => JSON.parse(await e.text())[1] || [] 
        },
        Bing: { 
            buildUrl: e => "https://api.bing.com/osjson.aspx?query=" + encodeURIComponent(e), 
            parseResponse: async e => JSON.parse(await e.text())[1] || [] 
        },
        DuckDuckGo: { 
            buildUrl: e => "https://duckduckgo.com/ac/?q=" + encodeURIComponent(e), 
            parseResponse: async e => (JSON.parse(await e.text()) || []).map(x => x.phrase) 
        },
        YouTube: { 
            buildUrl: e => "https://suggestqueries.google.com/complete/search?client=youtube&ds=yt&q=" + encodeURIComponent(e), 
            parseResponse: async e => {
                const t = await e.text();
                const o = JSON.parse(t.substring(t.indexOf("(") + 1, t.lastIndexOf(")")));
                return o[1]?.map(x => x[0]) || [];
            }
        },
        Wikipedia: { 
            buildUrl: e => "https://en.wikipedia.org/w/api.php?action=opensearch&search=" + encodeURIComponent(e), 
            parseResponse: async e => JSON.parse(await e.text())[1] || [] 
        },
        Reddit: { 
            buildUrl: e => "https://www.reddit.com/api/search_reddit_names.json?query=" + encodeURIComponent(e), 
            parseResponse: async e => JSON.parse(await e.text()).names || [] 
        }
    };

    const MODIFIERS = {
        PRODUCT_ATTRIBUTES: ["for men", "for women", "for kids", "for toddlers", "for boys", "for girls", "large", "small", "medium", "xl", "2xl", "black", "white", "red", "blue", "green", "2 pack", "3 pack", "gift", "eco friendly", "waterproof", "long sleeve", "short sleeve"],
        USER_INTENT: ["review", "vs", "alternative", "unboxing", "tutorial", "test", "how to use", "best", "cheap", "top rated", "deals", "discount", "for sale", "ideas", "outfit"],
        QUESTIONS: ["what is", "how does", "why is", "are", "where to buy", "can i wear", "is"]
    };
    const ALPHABET = "abcdefghijklmnopqrstuvwxyz".split("");

    // =========================================================================
    // CORE LOGIC (Replaces background.js)
    // =========================================================================

    function generateAllSubPhrases(text) {
        if (!text) return [];
        const words = text.toLowerCase().split(/\s+/).filter(Boolean);
        const subsets = new Set(words);
        for (let i = 0; i < words.length; i++) {
            for (let j = i + 1; j < words.length; j++) {
                subsets.add(words.slice(i, j + 1).join(" "));
            }
        }
        if (words.length > 1) subsets.add(words.join(" "));
        return [...subsets];
    }

    function generateHyperProfessionalPrefixes(title, brand, advancedWords) {
        const results = new Set();
        const t = title ? title.trim().toLowerCase() : "";
        const b = brand ? brand.trim().toLowerCase() : "";
        const advanced = advancedWords ? advancedWords.split(",").map(e => e.trim()).filter(Boolean) : [];
        
        let bases = new Set();
        if (t && b) {
            bases.add(`${t} ${b}`);
            bases.add(`${b} ${t}`);
        } else if (t) {
            bases.add(t);
        } else if (b) {
            generateAllSubPhrases(b).forEach(e => bases.add(e));
        }
        
        const baseArray = [...bases];
        
        if (advanced.length > 0) {
            baseArray.forEach(base => {
                results.add(base);
                advanced.forEach(adv => results.add(`${base} ${adv}`));
            });
        } else {
            baseArray.forEach(base => {
                results.add(base);
                MODIFIERS.PRODUCT_ATTRIBUTES.forEach(mod => results.add(`${base} ${mod}`));
                MODIFIERS.USER_INTENT.forEach(mod => {
                    results.add(`${base} ${mod}`);
                    results.add(`${mod} ${base}`);
                });
                MODIFIERS.QUESTIONS.forEach(mod => {
                    results.add(`${mod} ${base}`);
                    if (mod !== "are" && mod !== "is") results.add(`${base} ${mod} good`);
                });
                ALPHABET.forEach(letter => results.add(`${base} ${letter}`));
            });
        }
        return [...results];
    }

    async function fetchWithConcurrency(tasks, concurrencyLimit) {
        const results = [];
        const queue = [...tasks];

        async function worker() {
            if (queue.length === 0) return;
            const task = queue.shift();
            try {
                // IMPORTANT: Wrap target URL with Cloudflare Proxy
                const proxiedUrl = WORKER_URL + encodeURIComponent(task.url);
                const response = await fetch(proxiedUrl);
                
                if (response.ok) {
                    const parsedData = await task.parser(response);
                    results.push(...parsedData);
                }
            } catch (e) {
                console.error("Fetch failed for", task.url, e);
            }
            await worker();
        }

        const workers = Array(concurrencyLimit).fill(null).map(() => worker());
        await Promise.all(workers);
        return results;
    }

    async function executeScraping(config) {
        const { action, title, brand, advancedWords, negativeKeywords, market, platforms } = config;
        const prefixes = generateHyperProfessionalPrefixes(title, brand, advancedWords);
        let tasks = [];

        if (action === "fetchAdvancedSuggestions") {
            const m = markets[market] || markets.US;
            const baseUrl = `https://${m.domain}/api/2017/suggestions`;
            const params = `?page-type=Gateway&alias=aps&mid=${m.mid}`;
            
            prefixes.forEach(prefix => {
                tasks.push({
                    url: `${baseUrl}${params}&prefix=${encodeURIComponent(prefix)}`,
                    parser: async (res) => {
                        const json = await res.json();
                        return json.suggestions?.map(s => s.value) || [];
                    }
                });
            });
        } else if (action === "fetchMultiPlatformSuggestions") {
            platforms.forEach(plat => {
                const pConf = platformConfig[plat];
                if (pConf) {
                    prefixes.forEach(prefix => {
                        tasks.push({
                            url: pConf.buildUrl(prefix),
                            parser: pConf.parseResponse
                        });
                    });
                }
            });
        }

        // Fetch with concurrency of 15 (Matches original background.js)
        const rawResults = await fetchWithConcurrency(tasks, 15);
        let uniqueResults = [...new Set(rawResults)];

        // Apply Negative Keywords filter
        if (negativeKeywords) {
            const negatives = negativeKeywords.split(",").map(e => e.trim().toLowerCase()).filter(e => e.length > 0);
            if (negatives.length > 0) {
                uniqueResults = uniqueResults.filter(result => {
                    const rLower = result.toLowerCase();
                    return !negatives.some(neg => rLower.includes(neg));
                });
            }
        }

        // Apply Title presence filter
        if (title) {
            const tLower = title.trim().toLowerCase();
            if (tLower) {
                uniqueResults = uniqueResults.filter(result => result.toLowerCase().includes(tLower));
            }
        }

        return uniqueResults.sort();
    }


    // =========================================================================
    // UI & DOM HANDLING (Replaces popup.js)
    // =========================================================================

    document.addEventListener("DOMContentLoaded", () => {
        
        // 1. Tab Switching Logic
        const tabButtons = document.querySelectorAll(".tab-button");
        const views = document.querySelectorAll(".view");

        tabButtons.forEach(btn => {
            btn.addEventListener("click", () => {
                tabButtons.forEach(b => b.classList.remove("active"));
                views.forEach(v => v.classList.remove("active"));
                btn.classList.add("active");
                document.getElementById(btn.dataset.view).classList.add("active");
            });
        });

        // 2. Setup Platforms Checkboxes
        const platformKeys = Object.keys(platformConfig).sort();
        const checkboxContainer = document.getElementById("platform-checkboxes");
        platformKeys.forEach(key => {
            const label = document.createElement("label");
            label.innerHTML = `<input type="checkbox" class="platform-checkbox" value="${key}"> ${key}`;
            checkboxContainer.appendChild(label);
        });

        // 3. UI Helpers
        function renderResults(dataArray, listContainer, headerContainer, countSpan) {
            listContainer.innerHTML = "";
            if (dataArray.error) {
                headerContainer.style.display = "none";
                listContainer.innerHTML = `<li class="suggestion-item error">Error: ${dataArray.error}</li>`;
                return;
            }
            if (dataArray && dataArray.length > 0) {
                headerContainer.style.display = "flex";
                countSpan.textContent = `Found ${dataArray.length} keywords`;
                dataArray.forEach(kw => {
                    const li = document.createElement("li");
                    li.className = "suggestion-item";
                    li.textContent = kw;
                    li.addEventListener("click", () => {
                        navigator.clipboard.writeText(kw).then(() => {
                            const original = li.textContent;
                            li.textContent = "Copied!";
                            setTimeout(() => { li.textContent = original; }, 1000);
                        });
                    });
                    listContainer.appendChild(li);
                });
            } else {
                headerContainer.style.display = "none";
                listContainer.innerHTML = "<li style='padding:15px; text-align:center;'>No unique suggestions found.</li>";
            }
        }

        function setupExportButtons(getDataFn, copyBtn, txtBtn, csvBtn) {
            copyBtn.addEventListener("click", () => {
                const data = getDataFn();
                if (!data || data.length === 0) return;
                navigator.clipboard.writeText(data.join("\n")).then(() => {
                    const orig = copyBtn.textContent;
                    copyBtn.textContent = "Copied!";
                    setTimeout(() => copyBtn.textContent = orig, 2000);
                });
            });

            txtBtn.addEventListener("click", () => {
                const data = getDataFn();
                if (!data || data.length === 0) return;
                const blob = new Blob([data.join("\n")], { type: "text/plain" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "keywords.txt";
                a.click();
                URL.revokeObjectURL(url);
            });

            csvBtn.addEventListener("click", () => {
                const data = getDataFn();
                if (!data || data.length === 0) return;
                let csv = "Keywords\n" + data.map(e => e.includes(",") ? `"${e}"` : e).join("\n");
                const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "keywords.csv";
                a.click();
                URL.revokeObjectURL(url);
            });
        }

        // 4. Amazon View Logic
        let amzData = [];
        const amzBtn = document.getElementById("amz-analyze-btn");
        const amzMarket = document.getElementById("market-selector");
        
        // Restore saved market choice
        if (localStorage.getItem("selectedMarket")) {
            amzMarket.value = localStorage.getItem("selectedMarket");
        }
        amzMarket.addEventListener("change", () => {
            localStorage.setItem("selectedMarket", amzMarket.value);
        });

        amzBtn.addEventListener("click", async () => {
            const title = document.getElementById("amz-title").value.trim();
            const brand = document.getElementById("amz-brand").value.trim();
            if (!title && !brand) return;

            document.getElementById("amz-results").innerHTML = "<li style='padding:15px; text-align:center;'>Analyzing... This may take a moment.</li>";
            document.getElementById("amz-results-header").style.display = "none";
            amzBtn.disabled = true;
            amzBtn.textContent = "Analyzing...";
            document.getElementById("amz-loader").style.display = "block";

            try {
                amzData = await executeScraping({
                    action: "fetchAdvancedSuggestions",
                    title: title,
                    brand: brand,
                    advancedWords: document.getElementById("amz-advanced").value.trim(),
                    negativeKeywords: document.getElementById("amz-negative").value.trim(),
                    market: amzMarket.value
                });
                renderResults(amzData, document.getElementById("amz-results"), document.getElementById("amz-results-header"), document.getElementById("amz-count"));
            } catch (e) {
                renderResults({error: e.message}, document.getElementById("amz-results"), document.getElementById("amz-results-header"), document.getElementById("amz-count"));
            } finally {
                amzBtn.disabled = false;
                amzBtn.textContent = "Analyze Keywords";
                document.getElementById("amz-loader").style.display = "none";
            }
        });

        setupExportButtons(() => amzData, document.getElementById("amz-copy-btn"), document.getElementById("amz-txt-btn"), document.getElementById("amz-csv-btn"));

        // 5. Multi-Platform View Logic
        let platData = [];
        const platBtn = document.getElementById("plat-analyze-btn");

        platBtn.addEventListener("click", async () => {
            const title = document.getElementById("plat-title").value.trim();
            const brand = document.getElementById("plat-brand").value.trim();
            const selectedPlatforms = Array.from(document.querySelectorAll(".platform-checkbox:checked")).map(cb => cb.value);

            if (!title && !brand) return;
            if (selectedPlatforms.length === 0) {
                document.getElementById("plat-results").innerHTML = "<li style='padding:15px; text-align:center; color: red;'>Please select at least one platform.</li>";
                return;
            }

            document.getElementById("plat-results").innerHTML = "<li style='padding:15px; text-align:center;'>Analyzing... This may take a moment.</li>";
            document.getElementById("plat-results-header").style.display = "none";
            platBtn.disabled = true;
            platBtn.textContent = "Analyzing...";
            document.getElementById("plat-loader").style.display = "block";

            try {
                platData = await executeScraping({
                    action: "fetchMultiPlatformSuggestions",
                    title: title,
                    brand: brand,
                    advancedWords: document.getElementById("plat-advanced").value.trim(),
                    negativeKeywords: document.getElementById("plat-negative").value.trim(),
                    platforms: selectedPlatforms
                });
                renderResults(platData, document.getElementById("plat-results"), document.getElementById("plat-results-header"), document.getElementById("plat-count"));
            } catch (e) {
                renderResults({error: e.message}, document.getElementById("plat-results"), document.getElementById("plat-results-header"), document.getElementById("plat-count"));
            } finally {
                platBtn.disabled = false;
                platBtn.textContent = "Analyze Platforms";
                document.getElementById("plat-loader").style.display = "none";
            }
        });

        setupExportButtons(() => platData, document.getElementById("plat-copy-btn"), document.getElementById("plat-txt-btn"), document.getElementById("plat-csv-btn"));

    });
</script>
</body>
</html>
